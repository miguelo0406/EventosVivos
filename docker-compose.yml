services:
  db:
    image: postgres:16-alpine
    container_name: eventosvivos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventosvivos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - eventosvivos-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-eventosvivos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./EventosVivos.back/EventosVivos
      dockerfile: Dockerfile
    container_name: eventosvivos-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__EventosVivosDatabase: "Host=db;Port=5432;Database=${POSTGRES_DB:-eventosvivos};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:4200}
    ports:
      - "${API_PORT:-8081}:8080"

volumes:
  eventosvivos-db-data:
