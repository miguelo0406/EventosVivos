server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida la resuelve Angular (deep-links a /events/:id, etc.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para los assets con hash; el index nunca se cachea.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
